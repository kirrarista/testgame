name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ hashFiles('**/*.import') }}

      - name: Export Godot project
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          relative_export_path: ./build
          export_preset: "Web"

      - name: Copy coi-serviceworker to build
        run: cp coi-serviceworker.js ./build/Web/coi-serviceworker.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/Web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4